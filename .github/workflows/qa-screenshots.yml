name: QA Screenshots Capture

on:
  workflow_dispatch:

jobs:
  capture-qa-screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright and wait-on
        run: |
          npm i -g wait-on
          npx playwright install --with-deps chromium

      - name: Build Application
        run: npm run build

      - name: Serve Built App & Capture Screenshots
        run: |
          npx vite preview --port 4173 &
          wait-on http://localhost:4173 -t 60000
          QA_BASE_URL=http://localhost:4173 npm run qa:screenshots

      - name: Upload QA Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: randapp-qa-screenshots
          path: qa-screenshots/
          retention-days: 7
