    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#0f172a',
              accent: '#3b82f6',
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script>
      console.log('[HTML BOOT] index.html loaded');

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(registration => registration.unregister());
          console.log('[DEV] All service workers unregistered');
        });
      }

      if (window.caches) {
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
          console.log('[DEV] All caches cleared');
        });
      }

      window.addEventListener('error', function (event) {
        console.error('[GLOBAL ERROR]', event.error || event.message);
      });

      window.addEventListener('unhandledrejection', function (event) {
        console.error('[GLOBAL PROMISE REJECTION]', event.reason);
      });
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
